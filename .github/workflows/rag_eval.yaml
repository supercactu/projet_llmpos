name: Évaluation RAG

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Pas de cancel-in-progress ici : une évaluation planifiée doit se terminer
  cancel-in-progress: false

on:
  # Exécution automatique tous les lundis à 2h UTC
  schedule:
    - cron: "0 2 * * 1"

  # Déclenchement manuel depuis l'onglet Actions de GitHub
  # Utile pour tester ponctuellement sans attendre le lundi
  workflow_dispatch:

jobs:
  evaluer-rag:
    name: Évaluation RAG (Recall@k · MRR · ROUGE-L)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-eval-${{ runner.os }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            pip-eval-${{ runner.os }}-

      # Cache du modèle HuggingFace (évite ~5-15 min de téléchargement)
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-eval-${{ runner.os }}-${{ hashFiles('src/**/*.py', 'rag/**/*.py') }}
          restore-keys: |
            hf-eval-${{ runner.os }}-

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install rouge-score

      # Les clés Langfuse sont stockées dans les secrets GitHub Actions
      # (Paramètres du dépôt → Secrets → Actions) — jamais en clair dans le YAML
      - name: Construire la base de connaissance
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
        run: python -m rag.base_connaissance

      - name: Lancer l'évaluation RAG
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
        run: |
          # sys.exit(1) dans evaluer_rag.py fait échouer ce step
          # si Recall@3 < 0.75 ou ROUGE-L < 0.30 → régression détectée
          python evaluation/evaluer_rag.py

      # Publie le rapport JSON comme artefact téléchargeable
      - name: Publier le rapport d'évaluation
        if: always()   # Publie même si l'évaluation a échoué (utile pour analyser)
        uses: actions/upload-artifact@v4
        with:
          name: rapport-evaluation-rag-${{ github.run_id }}
          path: evaluation/rapport_eval.json
          retention-days: 30